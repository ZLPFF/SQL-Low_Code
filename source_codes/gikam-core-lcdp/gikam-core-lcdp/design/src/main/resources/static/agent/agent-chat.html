<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 开发助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .chat-container { width: 100%; height: 100vh; max-width: 900px; margin: 0 auto; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        .chat-header { padding: 16px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; align-items: center; gap: 12px; }
        .chat-header h1 { font-size: 18px; font-weight: 500; }
        .chat-status { margin-left: auto; font-size: 12px; opacity: 0.8; }
        
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        
        .message { display: flex; gap: 12px; animation: fadeIn 0.3s ease; }
        .message.user { flex-direction: row-reverse; }
        
        .message-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .message.user .message-avatar { background: #667eea; color: white; }
        .message.assistant .message-avatar { background: #10b981; color: white; }
        
        .message-content { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .message.user .message-content { background: #667eea; color: white; border-bottom-right-radius: 4px; }
        .message.assistant .message-content { background: #f3f4f6; color: #1f2937; border-bottom-left-radius: 4px; }
        .message.error .message-content { background: #fee2e2; color: #991b1b; }
        
        .action-result { margin-top: 8px; padding: 8px 12px; background: rgba(0,0,0,0.05); border-radius: 8px; font-size: 13px; }
        .action-result.success { border-left: 3px solid #10b981; }
        .action-result.error { border-left: 3px solid #ef4444; }
        
        .chat-input-container { padding: 16px 20px; border-top: 1px solid #e5e7eb; background: white; }
        .chat-input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
        
        .chat-input { flex: 1; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 24px; font-size: 14px; resize: none; outline: none; transition: border-color 0.2s; min-height: 48px; max-height: 120px; font-family: inherit; }
        .chat-input:focus { border-color: #667eea; }
        .chat-input:disabled { background: #f9fafb; cursor: not-allowed; }
        
        .send-button { padding: 12px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
        .send-button:hover:not(:disabled) { opacity: 0.9; }
        .send-button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .quick-actions { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .quick-action { padding: 6px 12px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 16px; font-size: 12px; color: #6b7280; cursor: pointer; transition: all 0.2s; }
        .quick-action:hover { background: #667eea; color: white; border-color: #667eea; }
        
        .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
        .typing-indicator span { width: 8px; height: 8px; background: #9ca3af; border-radius: 50%; animation: typing 1.4s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            <h1>AI 开发助手</h1>
            <span class="chat-status" id="status">准备就绪</span>
        </div>
        
        <div class="chat-messages" id="messages">
            <div class="message assistant">
                <div class="message-avatar">AI</div>
                <div class="message-content">
您好！我是低代码平台的 AI 开发助手，基于本地模型运行。我可以帮助您：

• 搜索和浏览平台资源
• 创建和修改页面、模块
• 执行数据库查询
• 通过检出-修改-同步机制完成开发任务

请问有什么可以帮您的？
                </div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="quick-actions" id="quickActions">
                <button class="quick-action" data-prompt="帮我列出所有模块">列出模块</button>
                <button class="quick-action" data-prompt="搜索登录相关资源">搜索登录</button>
                <button class="quick-action" data-prompt="列出所有表">列出表</button>
            </div>
            <div class="chat-input-wrapper">
                <textarea class="chat-input" id="messageInput" placeholder="输入您的问题或指令..." rows="1"></textarea>
                <button class="send-button" id="sendButton">发送</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '${API_BASE:/open/core/module/lcdp/agent}';
        
        let sessionId = localStorage.getItem('agent_session_id') || generateSessionId();
        localStorage.setItem('agent_session_id', sessionId);
        
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusEl = document.getElementById('status');
        
        function generateSessionId() {
            return 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }
        
        function setStatus(text) { statusEl.textContent = text; }
        
        function addMessage(role, content, actionResult = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = role === 'user' ? 'U' : 'AI';
            const actionHtml = actionResult ? `
                <div class="action-result ${actionResult.success ? 'success' : 'error'}">
                    <strong>${actionResult.actionType}</strong>: ${actionResult.details?.message || JSON.stringify(actionResult.details)}
                </div>
            ` : '';
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${escapeHtml(content)}${actionHtml}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function sendMessage(message) {
            if (!message.trim()) return;
            
            addMessage('user', message);
            messageInput.value = '';
            setStatus('处理中...');
            sendButton.disabled = true;
            messageInput.disabled = true;
            addTypingIndicator();
            
            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionId: sessionId,
                        message: message,
                        userId: 'web_user',
                        userName: 'Web User'
                    })
                });
                
                removeTypingIndicator();
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    addMessage('assistant', data.message, data.action);
                } else {
                    addMessage('assistant', '处理失败: ' + data.message, null, true);
                }
                
                setStatus('准备就绪');
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', '请求失败: ' + error.message, null, true);
                setStatus('连接失败');
            } finally {
                sendButton.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }
        
        sendButton.addEventListener('click', () => sendMessage(messageInput.value));
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });
        
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        });
        
        document.getElementById('quickActions').addEventListener('click', (e) => {
            if (e.target.classList.contains('quick-action')) {
                sendMessage(e.target.dataset.prompt);
            }
        });
        
        setStatus('准备就绪');
    </script>
</body>
</html>
